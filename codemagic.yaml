workflows:
  android-release:
    name: Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Recreate and patch Android folder
        script: |
          rm -rf android
          flutter create --platforms=android .
          flutter pub get
          python3 - << 'PYEOF'
          import re, os, base64, shutil
          
          # Patch build.gradle
          path = 'android/app/build.gradle'
          f = open(path).read()
          f = f.replace('minSdk flutter.minSdkVersion', 'minSdk 21')
          f = f.replace('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 21')
          if 'isCoreLibraryDesugaringEnabled' not in f:
              f = f.replace('compileOptions {', 'compileOptions {\n        isCoreLibraryDesugaringEnabled = true')
          if 'desugar_jdk_libs' not in f:
              f = f.replace('dependencies {', 'dependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")', 1)
          open(path,'w').write(f)
          print("build.gradle patched")
          print("minSdk 21:", 'minSdk 21' in f)
          print("desugaring:", 'isCoreLibraryDesugaringEnabled' in f)
          PYEOF
      - name: Build APK
        script: flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

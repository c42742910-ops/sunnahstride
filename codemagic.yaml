workflows:
  android-release:
    name: Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Recreate and patch Android folder
        script: |
          rm -rf android
          flutter create --platforms=android .
          flutter pub get

          if [ -f android/app/build.gradle.kts ]; then
            GRADLE_FILE="android/app/build.gradle.kts"
          elif [ -f android/app/build.gradle ]; then
            GRADLE_FILE="android/app/build.gradle"
          else
            echo "ERROR: no gradle file found"; find android -name "*.gradle*"; exit 1
          fi

          echo "Patching $GRADLE_FILE"

          python3 << PYEOF
import re

path = "$GRADLE_FILE"
f = open(path).read()

# Fix minSdk
f = re.sub(r'minSdk\s*=\s*flutter\.minSdkVersion', 'minSdk = 21', f)
f = re.sub(r'minSdkVersion\s+flutter\.minSdkVersion', 'minSdkVersion 21', f)

# Add isCoreLibraryDesugaringEnabled if missing
if 'isCoreLibraryDesugaringEnabled' not in f:
    f = re.sub(
        r'(compileOptions\s*\{)',
        r'\1\n        isCoreLibraryDesugaringEnabled = true',
        f
    )

# Add dependencies block with desugar dep — append if block missing, inject if present
if 'desugar_jdk_libs' not in f:
    desugar_dep = 'coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")'
    if re.search(r'dependencies\s*\{', f):
        f = re.sub(r'(dependencies\s*\{)', r'\1\n    ' + desugar_dep, f, count=1)
    else:
        f += '\ndependencies {\n    ' + desugar_dep + '\n}\n'

open(path, 'w').write(f)
print("=== FINAL FILE ===")
print(f)

assert 'isCoreLibraryDesugaringEnabled = true' in f, "FAIL: desugaring flag missing"
assert 'desugar_jdk_libs' in f, "FAIL: desugar dep missing"
print("All checks passed!")
PYEOF

      - name: Build APK
        script: flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

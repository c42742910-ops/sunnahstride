workflows:
  android-release:
    name: Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Recreate and patch Android folder
        script: |
          rm -rf android
          flutter create --platforms=android .
          flutter pub get

          echo "=== Listing android/app/ ==="
          ls -la android/app/

          # Detect Groovy vs Kotlin DSL
          if [ -f android/app/build.gradle.kts ]; then
            GRADLE_FILE="android/app/build.gradle.kts"
            echo "Found Kotlin DSL: $GRADLE_FILE"
          elif [ -f android/app/build.gradle ]; then
            GRADLE_FILE="android/app/build.gradle"
            echo "Found Groovy DSL: $GRADLE_FILE"
          else
            echo "ERROR: No build.gradle or build.gradle.kts found!"
            find android -name "*.gradle*"
            exit 1
          fi

          python3 - "$GRADLE_FILE" << 'PYEOF'
          import sys, re

          path = sys.argv[1]
          f = open(path).read()
          print("=== ORIGINAL ===")
          print(f)

          # Fix minSdk
          f = re.sub(r'minSdk\s*=?\s*flutter\.minSdkVersion', 'minSdk = 21', f)
          f = re.sub(r'minSdkVersion\s+flutter\.minSdkVersion', 'minSdkVersion 21', f)

          # Add isCoreLibraryDesugaringEnabled inside compileOptions
          if 'isCoreLibraryDesugaringEnabled' not in f:
              f = re.sub(
                  r'(compileOptions\s*\{)',
                  r'\1\n        isCoreLibraryDesugaringEnabled = true',
                  f
              )

          # Add desugar dependency to first dependencies block
          if 'desugar_jdk_libs' not in f:
              f = re.sub(
                  r'(dependencies\s*\{)',
                  r'\1\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")',
                  f,
                  count=1
              )

          open(path, 'w').write(f)
          print("=== PATCHED ===")
          print(f)
          assert 'isCoreLibraryDesugaringEnabled' in f, "desugaring flag MISSING"
          assert 'desugar_jdk_libs' in f, "desugar dep MISSING"
          print("All assertions passed!")
          PYEOF

      - name: Build APK
        script: flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

workflows:
  android-release:
    name: Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Recreate Android folder
        script: |
          rm -rf android
          flutter create --platforms=android .
          flutter pub get
      - name: Patch build.gradle
        script: |
          GRADLE=android/app/build.gradle
          # minSdk
          sed -i 's/minSdk flutter.minSdkVersion/minSdk 21/g' $GRADLE
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' $GRADLE
          # Add desugaring inside android { compileOptions block
          grep -q 'isCoreLibraryDesugaringEnabled' $GRADLE || \
            sed -i '/compileOptions {/a\        isCoreLibraryDesugaringEnabled = true' $GRADLE
          # Add desugar dependency
          grep -q 'desugar_jdk_libs' $GRADLE || \
            sed -i '/^dependencies {/a\    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")' $GRADLE
          echo "=== Gradle check ==="
          grep -E "minSdk|isCoreLibrary|desugar" $GRADLE
      - name: Build APK
        script: flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

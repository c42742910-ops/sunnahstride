workflows:
  android-release:
    name: Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Recreate Android folder
        script: |
          rm -rf android
          flutter create --platforms=android .
          flutter pub get
          python3 - << 'PYEOF'
          import re
          path = 'android/app/build.gradle'
          f = open(path).read()
          # Add minSdk 21
          f = f.replace('minSdk flutter.minSdkVersion', 'minSdk 21')
          f = f.replace('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 21')
          # Enable desugaring in android block
          if 'isCoreLibraryDesugaringEnabled' not in f:
              f = f.replace(
                  'compileOptions {',
                  'compileOptions {\n        isCoreLibraryDesugaringEnabled = true'
              )
          # Add desugar dependency
          if 'desugar_jdk_libs' not in f:
              f = f.replace(
                  'dependencies {',
                  'dependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")',
                  1
              )
          open(path,'w').write(f)
          print("build.gradle patched")
          print("minSdk 21:", 'minSdk 21' in f)
          print("desugaring:", 'isCoreLibraryDesugaringEnabled' in f)
          print("desugar_jdk_libs:", 'desugar_jdk_libs' in f)
          PYEOF
      - name: Build APK
        script: flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

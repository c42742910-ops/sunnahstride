workflows:
  android-release:
    name: Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Recreate and patch Android folder
        script: |
          rm -rf android
          flutter create --platforms=android .
          flutter pub get

          cat > android/app/build.gradle.kts << 'GRADLE'
          plugins {
              id("com.android.application")
              id("kotlin-android")
              id("dev.flutter.flutter-gradle-plugin")
          }

          android {
              namespace = "com.example.sunnahstride"
              compileSdk = flutter.compileSdkVersion
              ndkVersion = flutter.ndkVersion

              compileOptions {
                  isCoreLibraryDesugaringEnabled = true
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = JavaVersion.VERSION_17.toString()
              }

              defaultConfig {
                  applicationId = "com.example.sunnahstride"
                  minSdk = 21
                  targetSdk = flutter.targetSdkVersion
                  versionCode = flutter.versionCode
                  versionName = flutter.versionName
              }

              buildTypes {
                  release {
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }
          }

          flutter {
              source = "../.."
          }

          dependencies {
              coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")
          }
          GRADLE

          echo "=== FINAL FILE ==="
          cat android/app/build.gradle.kts

          grep -q 'isCoreLibraryDesugaringEnabled' android/app/build.gradle.kts || { echo "FAIL: desugaring flag missing"; exit 1; }
          grep -q 'desugar_jdk_libs' android/app/build.gradle.kts || { echo "FAIL: desugar dep missing"; exit 1; }
          grep -q 'minSdk = 21' android/app/build.gradle.kts || { echo "FAIL: minSdk missing"; exit 1; }
          echo "All checks passed!"

      - name: Build APK
        script: flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

workflows:
  android-release:
    name: Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Recreate and patch Android folder
        script: |
          rm -rf android
          flutter create --platforms=android .
          flutter pub get

          if [ -f android/app/build.gradle.kts ]; then
            GRADLE_FILE="android/app/build.gradle.kts"
          elif [ -f android/app/build.gradle ]; then
            GRADLE_FILE="android/app/build.gradle"
          else
            echo "ERROR: no gradle file found"
            find android -name "*.gradle*"
            exit 1
          fi

          echo "Patching: $GRADLE_FILE"

          # Fix minSdk
          sed -i 's/minSdk = flutter\.minSdkVersion/minSdk = 21/g' "$GRADLE_FILE"
          sed -i 's/minSdkVersion flutter\.minSdkVersion/minSdkVersion 21/g' "$GRADLE_FILE"

          # Add isCoreLibraryDesugaringEnabled inside compileOptions
          if ! grep -q 'isCoreLibraryDesugaringEnabled' "$GRADLE_FILE"; then
            sed -i 's/compileOptions {/compileOptions {\n        isCoreLibraryDesugaringEnabled = true/' "$GRADLE_FILE"
          fi

          # Add desugar dependency
          if ! grep -q 'desugar_jdk_libs' "$GRADLE_FILE"; then
            if grep -q 'dependencies {' "$GRADLE_FILE"; then
              sed -i 's/dependencies {/dependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")/' "$GRADLE_FILE"
            else
              printf '\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")\n}\n' >> "$GRADLE_FILE"
            fi
          fi

          echo "=== FINAL FILE ==="
          cat "$GRADLE_FILE"

          grep -q 'isCoreLibraryDesugaringEnabled' "$GRADLE_FILE" || { echo "FAIL: desugaring flag missing"; exit 1; }
          grep -q 'desugar_jdk_libs' "$GRADLE_FILE" || { echo "FAIL: desugar dep missing"; exit 1; }
          echo "All checks passed!"

      - name: Build APK
        script: flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

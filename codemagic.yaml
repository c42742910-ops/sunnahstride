workflows:
  android-release:
    name: Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Recreate Android folder
        script: |
          rm -rf android
          flutter create --platforms=android .
          flutter pub get
      - name: Build APK
        script: flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
